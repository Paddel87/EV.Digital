services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ev-digital-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ev_digital}
      POSTGRES_USER: ${POSTGRES_USER:-ev_digital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ev_digital}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ev_digital} -d ${POSTGRES_DB:-ev_digital}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: ev-digital-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-ev_digital}:${POSTGRES_PASSWORD:-ev_digital}@postgres:5432/${POSTGRES_DB:-ev_digital}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    volumes:
      - ./:/app
      - backend-node-modules:/app/node_modules
      - backend-workspace-modules:/app/backend/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    command: sh -c "npm install && npm run dev -w backend"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: ev-digital-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./:/app
      - frontend-node-modules:/app/node_modules
      - frontend-workspace-modules:/app/frontend/node_modules
    command: sh -c "npm install && npm run dev -w frontend"
    depends_on:
      - backend

volumes:
  postgres-data:
  backend-node-modules:
  backend-workspace-modules:
  frontend-node-modules:
  frontend-workspace-modules:
